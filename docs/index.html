<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>足彩预测SKIL — 自动预测</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif; background: #0f1923; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { text-align: center; padding: 40px; }
h1 { color: #4ecb71; font-size: 2.5em; margin-bottom: 10px; }
.subtitle { color: #8899aa; font-size: 1.2em; margin-bottom: 30px; }
.status { background: #1a2a3a; border-radius: 12px; padding: 30px; max-width: 500px; margin: 0 auto; }
.status .icon { font-size: 3em; margin-bottom: 15px; }
.status p { color: #667788; line-height: 1.8; }
.btn { display: inline-block; background: #1a3a2a; color: #4ecb71; padding: 12px 24px; border-radius: 8px; text-decoration: none; margin: 8px; transition: background 0.2s; }
.btn:hover { background: #2a5a3a; }
</style>
</head>
<body>
<div class="container">
<h1>足彩预测SKIL</h1>
<div class="subtitle">6组件融合自进化预测系统</div>
<div class="status">
  <div class="icon">&#9889;</div>
  <p>预测引擎已就绪</p>
  <p>每日北京时间 10:30 自动运行</p>
  <p style="margin-top:15px">
    <a class="btn" href="https://github.com/足彩预测SKIL/football-prediction-skill">查看源码</a>
  </p>

</div>
