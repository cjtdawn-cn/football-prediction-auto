name: Daily Football Prediction

on:
  schedule:
    - cron: '30 2 * * *'  # 每天 10:30 北京时间 (UTC+8)
  workflow_dispatch:  # 手动触发
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'
      - 'results/**'
      - 'data/knowledge_base.json'

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install numpy pandas scikit-learn xgboost lightgbm requests

      - name: Setup data directory
        run: |
          mkdir -p data models/results results docs

      - name: Download xgabora data (if not cached)
        run: |
          if [ ! -f data/Matches.csv ]; then
            echo "Note: xgabora data not present. Running with Elo-only mode."
            echo "[]" > data/matches_sample.json
          fi

      - name: Run prediction
        run: python scripts/run_predict.py
        env:
          PREDICTION_DATE: ${{ github.event.schedule == '' && github.event.inputs.date || '' }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: 'Auto: daily prediction update [skip ci]'

      - name: Run feedback loop
        run: python scripts/feedback_loop.py
        continue-on-error: true

      - name: Commit updated knowledge base
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/knowledge_base.json models/ 2>/dev/null || true
          git add results/ docs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily update: predictions & self-learning $(date +%Y-%m-%d)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
