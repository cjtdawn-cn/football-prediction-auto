name: Daily Football Prediction

on:
  schedule:
    - cron: '30 2 * * *'  # 每天 10:30 AM 北京时间 (UTC+8)
  workflow_dispatch:  # 手动触发
  push:
    branches: [master]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'
      - 'results/**'
      - 'data/knowledge_base.json'

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install numpy pandas scikit-learn xgboost lightgbm flask requests
          pip install git+https://github.com/cjtdawn-cn/football-prediction-skill.git

      - name: Setup data directory
        run: |
          mkdir -p data models/results results docs

      - name: Check data files
        run: |
          if [ ! -f data/Matches.csv ]; then
            echo "Note: xgabora data not present. Running with Elo-only mode."
          fi

      - name: Fetch today's match list
        run: python scripts/match_fetcher.py
        continue-on-error: true
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}

      - name: Fetch lottery data from 500.com
        run: python scripts/lottery_fetcher.py
        continue-on-error: true

      - name: Run prediction
        run: python scripts/run_predict.py

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Run feedback loop
        run: python scripts/feedback_loop.py
        continue-on-error: true

      - name: Commit updated knowledge base
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/knowledge_base.json models/ 2>/dev/null || true
          git add results/ docs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily update: predictions & self-learning $(date +%Y-%m-%d)"
            git pull --rebase origin master || true
            git push || true
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
